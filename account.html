<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | Naarithread</title>
  <link rel="icon" type="image/png" href="ChatGPT Image Jan 6, 2026, 11_31_50 AM.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="nt-account">
  <div class="nt-account-wrapper">

    <div class="nt-account-header">
      <h1>Account Overview</h1>
      <p>Manage your personal information</p>
    </div>

    <div class="nt-account-card">

      <div class="nt-account-row">
        <span class="nt-label">Full Name</span>
        <span class="nt-value" id="accountName"></span>
      </div>

      <div class="nt-account-row">
        <span class="nt-label">Email Address</span>
        <span class="nt-value" id="accountEmail"></span>
      </div>

      <div class="nt-account-actions">
        <button id="accountLogout" class="nt-logout-btn">
          Sign Out
        </button>
      </div>

    </div>

  </div>
</section>

<script src="account.js"></script>
</body>
</html>
